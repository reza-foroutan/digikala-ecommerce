<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="shortcut icon"
      href="./public/favicon/favicon.ico"
      type="image/x-icon"
    />
    <link rel="icon" href="./public/favicon/favicon.ico" type="image/x-icon" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + TS</title>
    <!-- Initialize CSS Website -->
    <link rel="stylesheet" type="text/css" href="./src/css/main.css" />
    <!-- End Initialize CSS Website -->
  </head>
  <body>
    <!-- Initialize Website -->
    <!-- Initialize SVG Website -->
    <svg style="display: none">
      <symbol
        id="notificationOffOutline"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
      >
        <path
          fill-rule="evenodd"
          d="M3.667 13.886A2.001 2.001 0 005 12V9a7 7 0 0114 0v3c0 .854.54 1.606 1.333 1.886a1 1 0 01.667.943V19a1 1 0 01-1 1H4a1 1 0 01-1-1v-4.17a1 1 0 01.667-.944zM19 18v-2.535A4 4 0 0117 12V9A5 5 0 007 9v3a4 4 0 01-2 3.465V18h14zm-7 5c-1.385 0-2.563-.835-3-2h6c-.437 1.165-1.615 2-3 2z"
          clip-rule="evenodd"
        ></path>
      </symbol>

      <symbol
        id="registerationSignIn"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
      >
        <path
          fill-rule="evenodd"
          d="M16 15h-2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v2h2V7a4 4 0 00-4-4H6a4 4 0 00-4 4v10a4 4 0 004 4h6a4 4 0 004-4v-2zm6-4H9.414l2.293-2.293-1.414-1.414-4 4a1 1 0 000 1.414l4 4 1.414-1.414L9.414 13H22v-2z"
          clip-rule="evenodd"
        ></path>
      </symbol>

      <symbol
        id="cartOff"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
      >
        <path
          fill-rule="evenodd"
          d="M20 4h2V2h-3a1 1 0 00-1 1v1H3a1 1 0 00-.995 1.1l1 10A1 1 0 004 16h15a1 1 0 001-1V4zm-2 17a2 2 0 110-4 2 2 0 010 4zM5 21a2 2 0 110-4 2 2 0 010 4zm13-7V6H4.105l.8 8H18z"
          clip-rule="evenodd"
        ></path>
      </symbol>
    </svg>
    <!-- End Initialize SVG Website -->
    <!-- Initialize Main Website -->
    <main class="main">
      <!-- Initialize wrapper Website -->
      <div class="wrapper">
        <!-- Initialize main header Website -->
        <div class="main-header">
          <!-- Initialize header Website -->
          <header class="header">
            <!-- Initialize header top Website -->
            <section class="header-top">
              <a href="#" target="_blank" class="header-top-link">
                <div class="header-top-link-box">
                  <picture>
                    <source srcset="" type="image/webp" />
                    <source srcset="" type="image/jpeg" />
                    <img class="header-top-link-box-img" src="" alt="" />
                  </picture>
                </div>
              </a>
            </section>
            <!-- End Initialize header top Website -->
            <!-- Initialize header middle Website -->
            <section class="main-header-middle">
              <div class="header-middle-wrapper">
                <div class="header-middle">
                  <!-- Initialize header middle logo box search box Website -->
                  <div class="header-middle-logo-box-search-box">
                    <!-- Initialize header middle logo box Website -->
                    <div class="header-middle-logo-box">
                      <div class="header-middle-logo-box-wrapper">
                        <a
                          href="./index.html"
                          class="header-middle-logo-box-link"
                          target="_blank"
                        >
                          <div class="header-middle-logo-box-link-box">
                            <img
                              src="./public/images/brand/full-horizontal.svg"
                              alt="لوگوی دیجیکالا"
                            />
                          </div>
                        </a>
                      </div>
                    </div>
                    <!-- End Initialize header middle logo box Website -->
                    <!-- Initialize header middle search box Website -->
                    <div class="header-middle-search-box">
                      <div class="header-middle-search-box-wrapper">
                        <input
                          type="search"
                          name="header-middle-search-name"
                          id="header-middle-search-id"
                          placeholder="جستجو"
                        />
                      </div>
                    </div>
                    <!-- End Initialize header middle search box Website -->
                  </div>
                  <!-- End Initialize header middle logo box search box Website -->
                  <!-- Initialize header middle notification box login box card box Website -->
                  <div class="notification-box-login-box-card-box">
                    <div class="notification-box-login-box-card-box-wrapper">
                      <!-- Initialize header middle notification box Website -->
                      <div class="header-middle-notification-box">
                        <div class="notification-box">
                          <a
                            href="./profile/notification/"
                            class="notification-box-link"
                          >
                            <div class="notification-box-link-box">
                              <svg>
                                <use xlink:href="#notificationOffOutline"></use>
                              </svg>
                            </div>
                          </a>
                        </div>
                      </div>
                      <!-- End Initialize header middle notification box Website -->
                      <!-- Initialize header middle login box Website -->
                      <div class="header-middle-login-box">
                        <a
                          href="./users/login/?backUrl=/"
                          class="login-box-link"
                        >
                          <div class="login-box-link-wrapper">
                            <div class="login-box-link-svg">
                              <svg>
                                <use xlink:href="#registerationSignIn"></use>
                              </svg>
                            </div>
                            ورود | ثبت‌نام
                          </div>
                        </a>
                      </div>
                      <!-- End Initialize header middle login box Website -->
                      <span class="header-middle-divider"></span>
                      <!-- Initialize header middle card box Website -->
                      <div class="header-middle-card-box">
                        <a href="./checkout/cart/" class="card-box-link">
                          <div class="card-box-link-box">
                            <svg>
                              <use xlink:href="#cartOff"></use>
                            </svg>
                          </div>
                        </a>
                      </div>
                      <!-- End Initialize header middle card box Website -->
                    </div>
                  </div>
                  <!-- End Initialize header middle notification box login box card box Website -->
                </div>
              </div>
            </section>
            <!-- End Initialize header middle Website -->
            <!-- Initialize header bottom Website -->
            <section class="main-header-bottom">
              <nav class="main-header-bottom-nav-location"></nav>
            </section>
            <!-- End Initialize header bottom Website -->
          </header>
          <!-- End Initialize header Website -->
        </div>
        <!-- Initialize main header Website -->
      </div>
      <!-- End Initialize wrapper Website -->
    </main>
    <!-- End Initialize Main Website -->
    <!-- Initialize Script Website -->
    <script type="module" src="./src/js/main.js"></script>
    <!-- End Initialize Script Website -->
    <!-- Initialize Website -->
  </body>
</html>
